# =====================================================
# EMAIL CONFIGURATION - Donation Management System
# =====================================================
# 
# IMPORTANT SECURITY NOTES:
# 1. NEVER commit this file to version control with real credentials
# 2. Add email.properties to .gitignore
# 3. Use App Password for Gmail (not your regular password)
# 
# HOW TO GET GMAIL APP PASSWORD:
# 1. Go to https://myaccount.google.com/security
# 2. Enable 2-Step Verification (if not already enabled)
# 3. Go to https://myaccount.google.com/apppasswords
# 4. Select "Mail" and your device
# 5. Click "Generate" - copy the 16-character password
# 6. Use that password below (without spaces)
# =====================================================

# Enable/Disable email functionality
email.enabled=true

# SMTP Server Configuration (Gmail)
email.smtp.host=smtp.gmail.com
email.smtp.port=587

# Authentication Credentials
# Replace with your actual Gmail and App Password
email.username=monobo611@gmail.com
email.password=fjfvsfleurmdjsny

# Sender Information
email.from.address=monobo611@gmail.com
email.from.name=Donation Management System

# Debug Mode (set to true to see detailed SMTP logs)
email.debug=false

# Timeout Settings (in milliseconds)
email.timeout.connection=10000
email.timeout.read=10000

